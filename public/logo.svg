<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 540" width="100%" height="100%">

  <!-- Clip path: lock body shape (inner purple area) for chevron bleed -->
  <defs>
    <clipPath id="lockBody">
      <rect x="10" y="190" width="480" height="340" rx="40" />
    </clipPath>
  </defs>

  <!-- Shackle (arch): border is now 20px each side to match lock body -->
  <!-- outer stroke: 50 + 2*20 = 90, inner stroke: 50 -->
  <path d="M 160 210 V 140 A 90 90 0 0 1 340 140 V 210"
        fill="none" stroke="#000000" stroke-width="90"
        stroke-linecap="round" />
  <path d="M 160 210 V 140 A 90 90 0 0 1 340 140 V 210"
        fill="none" stroke="#7B52F2" stroke-width="50"
        stroke-linecap="round" />

  <!-- Lock body outer (rounded rect) -->
  <rect x="10" y="190" width="480" height="340" rx="40" fill="#000000" />
  <!-- Lock body inner (purple) -->
  <rect x="30" y="210" width="440" height="300" rx="20" fill="#7B52F2" />

  <!-- Envelope/chevron divider: extends past the border edges, clipped to lock body -->
  <path d="M -20 290 L 250 390 L 520 290"
        fill="none" stroke="#000000" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"
        clip-path="url(#lockBody)" />

  <!-- Keyhole panel outer -->
  <rect x="175" y="310" width="150" height="170" rx="35" fill="#000000" />
  <!-- Keyhole panel inner -->
  <rect x="195" y="330" width="110" height="130" rx="20" fill="#7B52F2" />

  <!-- Keyhole: true circle for the top -->
  <circle cx="250" cy="370" r="20" fill="#000000" />
  <!-- Keyhole stem -->
  <path d="M 236 378
           L 226 412
           A 5 5 0 0 0 231 418
           H 269
           A 5 5 0 0 0 274 412
           L 264 378 Z"
        fill="#000000" />

</svg>
